<body>
<div class="admin-container">
    <div class="admin-card">
        <div class="card-header">
            <h4 class="card-title"><i class="fas fa-building me-2"></i>Add New Department</h4>
            <a href="admin_dashboard.php" class="btn btn-sm btn-light">
                <i class="fas fa-tachometer-alt me-1"></i> Dashboard
            </a>
        </div>
        <div class="card-body p-4">
            <form id="deptForm" method="POST" action="add_department.php">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="department_name" class="form-label">Department Name</label>
                        <input type="text" name="department_name" class="form-control" id="department_name" placeholder="Cardiology, Neurology, etc." required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label for="department_code" class="form-label">Department Code</label>
                        <input type="text" name="department_code" class="form-control" id="department_code" placeholder="e.g. CARD, NEURO" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="department_head" class="form-label">Department Head</label>
                    <input type="text" name="department_head" class="form-control" id="department_head" placeholder="Dr. John Smith">
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label">Description</label>
                    <textarea name="description" id="description" class="form-control form-textarea" placeholder="Brief description of department services"></textarea>
                </div>

                <div class="mb-4">
                    <label for="status" class="form-label">Status</label>
                    <select name="status" id="status" class="form-select" required>
                        <option value="active" selected>Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="under-construction">Under Construction</option>
                    </select>
                </div>

                <div class="action-buttons">
                    <button type="submit" name="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i> Save Department
                    </button>
                    <a href="admin_dashboard.html" class="btn btn-outline-secondary">
                        <i class="fas fa-times me-2"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
